        types = ["Conference"]

        [[params.publication.list]]
            title = "単語の階層関係に基づくデータ拡張を利用した画像キャプション生成の検討"
            authors = "吉田智哉, 西村太一, 亀甲博貴, 森信介"
            date = "2023"
            journal = "言語処理学会第29回年次大会 (NLP2023)"
            url = "https://www.anlp.jp/proceedings/annual_meeting/2023/pdf_dir/P2-1.pdf"
            type = "Conference"

