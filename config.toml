baseURL = "https://biscue5.github.io"
languageCode = "en-us"
theme = "aafu"

publishDir = "docs"

[build]
  writeStats = true

[params]
    title = "Aafu theme"
    author = "Tomoya Yoshida"
    description = "Biscue homepage"
    #copyright = "short copyright message"

    [params.theme]
        # Available themes are 'light', 'dark', 'ocean', and 'pinkish'
        mainTheme = "ocean"
        # setting false below will hide 'aafu by darshan' displayed under the profile pic
        showAttribute = false
        singlePage = false

