    # Profile section
    [params.profile]
        name = "Tomoya Yoshida"
        #tagline = "Master thesis"
        location = "M.S. student"
        photo = "dog.jpg"

    # Section for links to social websites
    [params.social]
        title = "Links"

        [[params.social.list]]
            icon = "fab fa-linkedin-in"
            url = "#"
            title = "LinkedIn"		
        [[params.social.list]]
            icon = "fab fa-github"
            url = "https://github.com/Biscue5"
            title = "GitHub"
        [[params.social.list]]
            icon = "fab fa-twitter"
            url = "https://twitter.com/Biscue_510"
            title = "Twitter"
